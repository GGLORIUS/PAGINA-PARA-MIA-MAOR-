```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* PORTADA (SIN IMAGEN) */
#portada {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #000000, #ff69b4, #000000);
  text-align: center;
  z-index: 1000;
}

#portada h1 {
  font-size: 45px;
  margin-bottom: 20px;
  animation: latido 1.5s infinite;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

#portada button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#portada button:hover {
  transform: scale(1.1);
}

/* CONTENIDO */
#contenido {
  display: none;
  padding: 40px;
  text-align: center;
}

h2 {
  font-size: 30px;
}

p {
  font-size: 20px;
  max-width: 600px;
  margin: auto;
  line-height: 1.6;
}

/* CORAZONES FLOTANTES */
.corazon {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: subir 5s linear infinite;
}

@keyframes subir {
  0% {
    transform: translateY(100vh);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="portada">
  <h1>Para Ti ❤️</h1>
  <button onclick="empezar()">EMPEZAMOS</button>
</div>

<!-- AUDIO -->
<audio id="miMusica" src="musica.mp3"></audio>

<!-- CONTENIDO -->
<div id="contenido">
  <h2>Mi amor 💕</h2>
  <p>
    Esta página la hice solo para ti... 💖<br><br>
    Cada detalle tiene un pedacito de mi corazón ✨<br><br>
    Gracias por hacer mi vida más bonita ❤️
  </p>
</div>

<script>
function empezar() {
  document.getElementById("miMusica").play();
  document.getElementById("portada").style.display = "none";
  document.getElementById("contenido").style.display = "block";

  crearCorazones();
}

/* CORAZONES */
function crearCorazones() {
  setInterval(() => {
    const corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";

    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(corazon);

    setTimeout(() => {
      corazon.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
