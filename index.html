```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* PORTADA */
#portada {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: linear-gradient(black, pink);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  z-index: 1000;
  text-align: center;
}

#portada h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

#portada button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  background: white;
  color: black;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

#portada button:hover {
  transform: scale(1.1);
}

/* CONTENIDO */
#contenido {
  display: none;
  padding: 40px;
  text-align: center;
}

h2 {
  font-size: 30px;
}

p {
  font-size: 20px;
  max-width: 600px;
  margin: auto;
}

/* ANIMACIÓN */
.fade-in {
  animation: aparecer 2s ease;
}

@keyframes aparecer {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<!-- PORTADA -->
<div id="portada">
  <h1>Para Ti ❤️</h1>
  <button onclick="empezar()">EMPEZAMOS</button>
</div>

<!-- AUDIO -->
<audio id="miMusica" src="musica.mp3"></audio>

<!-- CONTENIDO -->
<div id="contenido" class="fade-in">
  <h2>Mi amor 💕</h2>
  <p>
    Desde que llegaste a mi vida todo es diferente...<br><br>
    Esta página es solo una pequeña forma de demostrarte lo mucho que te amo 💖<br><br>
    Gracias por existir ✨
  </p>
</div>

<!-- SCRIPT -->
<script>
function empezar() {
  var musica = document.getElementById("miMusica");
  musica.play();

  document.getElementById("portada").style.display = "none";
  document.getElementById("contenido").style.display = "block";
}
</script>

</body>
</html>
