<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Ti ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

.slider {
  display: flex;
  width: 600vw; /* 6 imágenes */
  height: 100vh;
  transition: transform 0.5s ease;
}

.slide {
  width: 100vw;
  height: 100vh;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.indicadores {
  position: absolute;
  top: 10px;
  width: 100%;
  display: flex;
  gap: 5px;
  padding: 0 10px;
}

.barra {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 5px;
}

.barra.activa {
  background: white;
}

.mensaje {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 20px;
}
</style>
</head>

<body>

<div class="slider" id="slider">

  <div class="slide"><img src="img/foto1.jpg"></div>
  <div class="slide"><img src="img/foto2.jpg"></div>
  <div class="slide"><img src="img/foto3.jpg"></div>
  <div class="slide"><img src="img/foto6.jpg"></div>
  <div class="slide"><img src="img/foto7.jpg"></div>
  <div class="slide"><img src="img/foto8.jpg"></div>

  <!-- Indicadores -->
  <div class="indicadores">
    <div class="barra activa"></div>
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
    <div class="barra"></div>
  </div>

  <div class="mensaje" id="mensaje">
    Nuestro inicio ❤️
  </div>

</div>

<!-- Música -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
let slider = document.getElementById("slider");
let index = 0;
let total = 6;

let mensajes = [
  "Nuestro inicio ❤️",
  "Ese día fue especial ✨",
  "Contigo todo es mejor 💖",
  "Momentos únicos juntos 😍",
  "Eres mi lugar favorito 🌍",
  "Te amo demasiado ❤️"
];

let startX = 0;

function actualizar() {
  slider.style.transform = "translateX(-" + index * 100 + "vw)";
  document.getElementById("mensaje").innerText = mensajes[index];

  let barras = document.querySelectorAll(".barra");
  barras.forEach((b, i) => {
    b.classList.toggle("activa", i === index);
  });
}

/* Swipe celular */
slider.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50) {
    index = (index + 1) % total;
  } else if (endX - startX > 50) {
    index = (index - 1 + total) % total;
  }

  actualizar();
});

/* Click PC */
slider.addEventListener("click", e => {
  if (e.clientX > window.innerWidth / 2) {
    index = (index + 1) % total;
  } else {
    index = (index - 1 + total) % total;
  }
  actualizar();
});

/* Música */
document.body.addEventListener("click", () => {
  document.getElementById("musica").play();
}, { once: true });

</script>

</body>
</html>
